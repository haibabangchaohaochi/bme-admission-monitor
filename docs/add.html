<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1f3a">
  <title>新增学校</title>
  <link rel="stylesheet" href="assets/style.css">
  <script defer src="assets/add-school.js"></script>
</head>
<body>
  <div class="page-shell add-page">
    <header class="hero compact">
      <div>
        <p class="eyebrow">Add School</p>
        <h1>新增学校入口</h1>
        <p class="subtitle">支持本机临时新增和生成可提交到 GitHub Issue 的 YAML 配置。</p>
      </div>
      <div class="hero-actions">
        <a class="action-btn" href="index.html">返回首页</a>
      </div>
    </header>

    <section class="panel form-panel">
      <form id="addSchoolForm" class="form-grid">
        <label>学校/研究所名称<input name="name" required></label>
        <label>简称<input name="aliases" placeholder="逗号分隔"></label>
        <label>层次<select name="level"><option>985</option><option>211</option><option>双非</option><option>科研院所</option><option>其他</option></select></label>
        <label>所在城市<input name="province_city"></label>
        <label>重点学院<textarea name="target_colleges" rows="4" placeholder="逗号或换行分隔"></textarea></label>
        <label>官方网站链接<input name="official_sites" placeholder="https://..."></label>
        <label>研究生院/研招网链接<input name="search_domains" placeholder="https://yz.xxx.edu.cn 或 xxx.edu.cn"></label>
        <label>学院招生通知栏目链接<input name="college_notice_url" placeholder="https://..."></label>
        <label>关注方向<textarea name="preferred_directions" rows="4" placeholder="医学影像、超声、脑机接口等"></textarea></label>
        <label>优先级<select name="priority"><option>high</option><option selected>medium</option><option>low</option></select></label>
        <label>备注<textarea name="notes" rows="4"></textarea></label>
      </form>

      <div class="button-row">
        <button class="action-btn primary" id="tempAddBtn" type="button">本机临时加入</button>
        <button class="action-btn" id="yamlBtn" type="button">生成 YAML 配置</button>
        <button class="action-btn" id="issueBtn" type="button">提交到 GitHub Issue</button>
      </div>

      <label class="yaml-preview-label">YAML 预览<textarea id="yamlPreview" rows="14" readonly></textarea></label>
      <p class="hint">临时新增只保存在当前设备浏览器 localStorage；永久新增需要把 YAML 复制到 extra_schools.yaml 或通过 GitHub Issue + Actions 合并。</p>
    </section>
  </div>
</body>
</html>
